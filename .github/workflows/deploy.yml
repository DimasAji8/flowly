name: Deploy Teman Kas (production)

# Deploy otomatis saat push ke main, atau manual via Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Cegah dua deploy jalan bersamaan.
concurrency:
  group: temankas-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy on VPS
    # Self-hosted runner di VPS (lihat docs/deployment/90-deployment.md)
    runs-on:
      - self-hosted
      - linux
      - temankas-prod

    env:
      APP_DIR: /srv/apps/temankas/current

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sinkron source ke direktori aplikasi (build langsung di VPS).
      - name: Sync source to app directory
        run: |
          mkdir -p "$APP_DIR"
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'apps/web/.next' \
            --exclude 'apps/api/dist' \
            ./ "$APP_DIR"/

      # Tulis env produksi dari GitHub Secrets (tidak pernah di-commit).
      - name: Write production env files
        run: |
          cat > "$APP_DIR/apps/api/.env.production" <<'EOF'
          NODE_ENV=production
          PORT=3333
          ${{ secrets.API_ENV_PROD }}
          EOF
          cat > "$APP_DIR/apps/web/.env.production" <<'EOF'
          NODE_ENV=production
          PORT=4000
          ${{ secrets.WEB_ENV_PROD }}
          EOF
          chmod 600 "$APP_DIR/apps/api/.env.production" "$APP_DIR/apps/web/.env.production"

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Generate Prisma client
        working-directory: ${{ env.APP_DIR }}
        run: npm run db:generate

      - name: Lint
        working-directory: ${{ env.APP_DIR }}
        run: npm run lint

      - name: Build (web + api)
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      # Migrasi produksi: migrate deploy (BUKAN db push).
      - name: Run database migrations
        working-directory: ${{ env.APP_DIR }}/apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: npx prisma migrate deploy

      - name: Restart services
        run: |
          sudo systemctl restart temankas-api.service
          sudo systemctl restart temankas-web.service

      # Deploy sukses HANYA bila kedua healthcheck mengembalikan HTTP 200.
      - name: Healthcheck
        run: |
          set -e
          echo "Menunggu service siap..."
          for i in $(seq 1 30); do
            api=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3333/api/v1 || true)
            web=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000 || true)
            echo "  attempt $i: api=$api web=$web"
            if [ "$api" = "200" ] && [ "$web" = "200" ]; then
              echo "Healthcheck OK (api & web = 200)."
              exit 0
            fi
            sleep 3
          done
          echo "Healthcheck GAGAL — service tidak mengembalikan 200." >&2
          sudo journalctl -u temankas-api -n 50 --no-pager || true
          sudo journalctl -u temankas-web -n 50 --no-pager || true
          exit 1
