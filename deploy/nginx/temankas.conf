# Teman Kas — Frontend (Next.js)
# Domain: temankas.com + www.temankas.com  ->  127.0.0.1:4000
#
# Setelah file ini terpasang di /etc/nginx/sites-available/temankas.conf
# dan di-symlink ke sites-enabled, jalankan Certbot:
#   sudo certbot --nginx -d temankas.com -d www.temankas.com
# Certbot akan otomatis menambah blok listen 443 + redirect HTTP->HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name temankas.com www.temankas.com;

    # Healthcheck/letsencrypt lewat HTTP tetap diizinkan.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / HMR-safe (untuk Next.js)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }

    # Batas upload wajar
    client_max_body_size 10M;
}
