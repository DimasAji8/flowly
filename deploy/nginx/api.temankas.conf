# Teman Kas — Backend API (NestJS)
# Domain: api.temankas.com  ->  127.0.0.1:3333
#
# Setup (sekali):
#   1. sudo certbot --nginx -d api.temankas.com
#   2. sudo apt install -y apache2-utils
#   3. sudo htpasswd -c /etc/nginx/.htpasswd-api b2b-user
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.temankas.com;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.temankas.com;

    ssl_certificate /etc/letsencrypt/live/api.temankas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.temankas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Swagger docs — diproteksi Basic Auth (B2B)
    location /api/v1/docs {
        auth_basic "Flowly API — B2B Docs";
        auth_basic_user_file /etc/nginx/.htpasswd-api;

        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    client_max_body_size 10M;
}
