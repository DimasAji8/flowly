# Teman Kas — Backend API (NestJS)
# Domain: api.temankas.com  ->  127.0.0.1:3333
#
# Pasang di /etc/nginx/sites-available/api.temankas.conf, symlink ke sites-enabled,
# lalu jalankan Certbot:
#   sudo certbot --nginx -d api.temankas.com

server {
    listen 80;
    listen [::]:80;
    server_name api.temankas.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    client_max_body_size 10M;
}
